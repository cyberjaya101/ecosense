name: ecosense
description: Unified EcoSense App (Student & Admin)

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # ─── FIREBASE ────────────────────────────────
  firebase_core: ^2.32.0
  cloud_firestore: ^4.17.5
  # ─── UI ──────────────────────────────────────
  cupertino_icons: ^1.0.2
  google_fonts: ^6.2.1
  google_maps_flutter: ^2.6.1
  image_picker: ^1.0.7
  flutter_dotenv: ^5.1.0

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/maps/Maps.png
    - assets/maps/um_campus_new.geojson
    - assets/mock_barcode.png
